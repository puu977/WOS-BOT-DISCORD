name: WOS-Pusat-Komando-Abadi

on:
  schedule:
    # Berjalan otomatis setiap 30 menit
    - cron: '*/30 * * * *'
  workflow_dispatch: # Tombol untuk menjalankan manual

jobs:
  bot-eksekusi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Menginstal numpy versi stabil terlebih dahulu untuk menghindari error
          pip install numpy==2.1.3
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bot
        run: python main.py
        env:
          # Pastikan rahasia ini sudah diisi di Settings > Secrets > Actions
          BOT_TOKEN: ${{ secrets.MTQ0MDAxODAyNDczMTExNTU3MQ.GHw_V5.pVBnasncuxrtXWJWHlk-ggjKVr4KNFIto_bXis }}

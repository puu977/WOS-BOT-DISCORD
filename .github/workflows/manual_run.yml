name: WOS-Pusat-Komando-Abadi

on:
  schedule:
    - cron: '*/30 * * * *'  # Jalan setiap 30 menit (UTC)
  workflow_dispatch:

jobs:
  bot-eksekusi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kode
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 -r requirements.txt

      - name: Jalankan Bot
        run: python main.py --autoupdate
        env:
          BOT_TOKEN: ${{ secrets.MTQ0MDAxODAyNDczMTExNTU3MQ.GHw_V5.pVBnasncuxrtXWJWHlk-ggjKVr4KNFIto_bXis }}

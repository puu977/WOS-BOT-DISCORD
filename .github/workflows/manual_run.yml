name: WOS-Pusat-Komando-Abadi

on:
  schedule:
    - cron: '*/30 * * * *'  # Jalan setiap 30 menit (UTC)
  workflow_dispatch:

jobs:
  bot-eksekusi:
    runs-on: ubuntu-latest
    steps:
      # Ambil kode dari repo
      - name: Checkout Kode
        uses: actions/checkout@v4

      # Pasang Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Instal semua library sekaligus
      - name: Instal Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 -r requirements.txt

      # Jalankan bot
      - name: Jalankan Bot
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.MTQ0MDAxODAyNDczMTExNTU3MQ.GHw_V5.pVBnasncuxrtXWJWHlk-ggjKVr4KNFIto_bXis }}

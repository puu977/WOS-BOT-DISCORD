name: WOS-Pusat-Komando-Abadi

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  bot-eksekusi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bot
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.MTQ0MDAxODAyNDczMTExNTU3MQ.GHw_V5.pVBnasncuxrtXWJWHlk-ggjKVr4KNFIto_bXis }}

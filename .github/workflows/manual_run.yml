name: WOS-Pusat-Komando-Abadi

on:
  schedule:
    # Aktif otomatis setiap 30 menit, 24 jam sehari.
    # Ini memastikan Gift Code terpantau dan Event Aliansi tercover.
    - cron: '*/30 * * * *'
  
  # Memungkinkan Anda menjalankan bot kapan saja secara manual dari HP
  workflow_dispatch: 

jobs:
  bot-eksekusi:
    runs-on: ubuntu-latest
    
    # Mencegah penumpukan sesi jika bot sebelumnya masih berjalan
    concurrency:
      group: wos-bot-session
      cancel-in-progress: false

    steps:
      - name: Ambil Kode dari GitHub
        uses: actions/checkout@v4

      - name: Pasang Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Mempercepat proses instalasi berikutnya

      - name: Instal Library Pendukung
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Jalankan Bot Otomatis
        run: python main.py
        env:
          # Pastikan Anda sudah mengisi 'BOT_TOKEN' di menu Settings > Secrets
          BOT_TOKEN: ${{ secrets.MTQ0MDAxODAyNDczMTExNTU3MQ.GHw_V5.pVBnasncuxrtXWJWHlk-ggjKVr4KNFIto_bXis }}
          # Jika bot butuh variabel lain, tambahkan di bawah ini
          #Contoh: ACCOUNT_EMAIL: ${{ secrets.ACCOUNT_EMAIL }}
          
